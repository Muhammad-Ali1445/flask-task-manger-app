<!DOCTYPE html>
<html>
  <title>Tasks</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <body>
    <header class="dashboard-header">
      <div class="logo">TaskFlow</div>

      <h2>My Tasks Dashboard</h2>

      <a href="/logout" class="logout-btn">↩ Logout</a>
    </header>

    <main class="dashboard-container">
      <div class="toolbar">
        <a href="/create_task" class="add-btn">+ Add Task</a>
      </div>

      <section class="table-card">
        <!-- your tasks table -->
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Description</th>
              <th>Status</th>
              <th>Due Date</th>
              <th>Created At</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for task in tasks %}
              <tr>
                <td>{{ task.id }}</td>
                <td class="task-title">{{ task.title }}</td>
                <td>{{ task.description }}</td>
                <td>
                  <!-- Using a dynamic class based on status -->
                  <span class="status-badge {{ task.status.value.lower().replace(' ', '_') }}">{{ task.status.value }}</span>
                </td>
                <td>{{ task.due_date }}</td>
                <td>{{ task.friendly_time }}</td>
                <td>
                  <!-- Edit: Just a link to the update page (GET request) -->
                  <a href="{{ url_for('update_task', id=task.id) }}" class="edit-btn">Edit</a>

                  <!-- Delete: A form (POST request) for security -->
                  <form action="{{ url_for('delete_task', id=task.id) }}" method="POST" style="display:inline; box-shadow: none; padding: 0; background: none;">
                    <button type="submit" class="delete-btn" onclick="return confirm('Delete this task?')">Delete</button>
                  </form>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
