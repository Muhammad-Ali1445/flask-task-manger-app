<!DOCTYPE html>
<html>
  <head>
    <title>Update Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <h1>Edit Task</h1>

    <form action="{{ url_for("update_task", id=task.id) }}" method="POST">
      
      <label for="title">Task Title:</label>
      <input type="text" name="title" id="title" value="{{ task.title }}" required />

      <label for="description">Description:</label>
      <input type="text" name="description" id="description" value="{{ task.description }}" required />

      <label for="status">Status:</label>
      <select name="status">
        <option value="PENDING" {% if task.status.name == "PENDING" %} selected {% endif %}>Pending</option>
        <option value="IN_PROGRESS" {% if task.status.name == "IN_PROGRESS" %} selected {% endif %}>In Progress</option>
        <option value="COMPLETE" {% if task.status.name == "COMPLETE" %} selected {% endif %}>Completed</option>

      </select>

      <button type="submit" class="create-btn">Save Changes</button>
    </form>
  </body>
</html>
